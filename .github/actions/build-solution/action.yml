name: Action - Build JPEGView (CMake + vcpkg)
description: Configure and build JPEGView with CMake, Visual Studio 2022, and vcpkg

inputs:
  patch-version:
    description: Apply patch to the version labels to reflect the owner and sha of commit.
    required: false
    type: boolean
    default: true

  platform-arch:
    description: Architecture for building (x64 or Win32)
    required: true
    type: string

  build-config:
    description: Debug/Release for building
    required: true
    type: string

  build-setup:
    description: Also build the WiX MSI installer (requires WiX Toolset installed)
    required: false
    type: boolean
    default: false

runs:
  using: composite
  steps:
    - name: Setup Git Short SHA env var + Print GitHub commit/trigger info
      shell: powershell
      run: |
        echo "short_sha=$(git rev-parse --short '${{ github.sha }}')" >> $env:GITHUB_ENV
        echo "Repository: ${{ github.repository }}"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo "GH Trigger: ${{ github.event_name }}"

    - name: Replace resource vars
      if: ${{ inputs.patch-version }}
      shell: powershell
      run: |
        Get-Command sed.exe | Format-List
        $GIT_SHORT_HASH=$(git.exe rev-parse --short "${{ github.sha }}")
        $APPEND_VER_STR="\(~GHdevtest ${{ github.repository_owner }}\/$GIT_SHORT_HASH\)"
        sed.exe -i -r -e "s/(#define JPEGVIEW_VERSION \`"[0-9, ]+)(\\\0\`")/\1 $APPEND_VER_STR\2/g" -e "s/(#define JPEGVIEW_TITLE \`"JPEGView)(\`")/\1 $APPEND_VER_STR\2/g" src/JPEGView/resource.h
        sed.exe -i -r -e "s/(\<Product.*ApplicationName\))/\1 $APPEND_VER_STR/g" src/JPEGView.Setup/Product.wxs
        Select-String -Path src/JPEGView/resource.h -Pattern "JPEGVIEW_"
        Select-String -Path src/JPEGView.Setup/Product.wxs -Pattern "<Product"

    - name: Select vcpkg triplet
      id: triplet
      shell: powershell
      run: |
        if ("${{ inputs.platform-arch }}" -eq "x64") {
          echo "triplet=x64-windows-static" >> $env:GITHUB_OUTPUT
        } else {
          # Custom triplet works around an MSVC ICE in libraw's x86 Debug build.
          echo "triplet=x86-windows-static-jpegview" >> $env:GITHUB_OUTPUT
        }

    - name: Fetch vcpkg baseline commit
      # The preinstalled vcpkg on windows-2022 runners is a shallow clone, so
      # the builtin-baseline commit referenced by vcpkg.json may be absent.
      # Fetch it explicitly so manifest-mode baseline checkout succeeds.
      shell: powershell
      run: |
        $baseline = (Get-Content vcpkg.json -Raw | ConvertFrom-Json).'builtin-baseline'
        Write-Host "Fetching vcpkg baseline commit $baseline into $env:VCPKG_ROOT"
        git -C $env:VCPKG_ROOT fetch --depth=1 origin $baseline

    - name: Configure (CMake + vcpkg manifest mode)
      shell: cmd
      env:
        VCPKG_DEFAULT_TRIPLET: ${{ steps.triplet.outputs.triplet }}
      run: |
        set SETUP_OPT=
        if "${{ inputs.build-setup }}"=="true" set SETUP_OPT=-DJPEGVIEW_BUILD_SETUP=ON
        cmake -B build -S . -G "Visual Studio 17 2022" -A ${{ inputs.platform-arch }} ^
          -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%/scripts/buildsystems/vcpkg.cmake ^
          -DVCPKG_TARGET_TRIPLET=${{ steps.triplet.outputs.triplet }} ^
          -DVCPKG_OVERLAY_PORTS=%CD%/vcpkg-triplets ^
          -DVCPKG_OVERLAY_TRIPLETS=%CD%/vcpkg-triplets ^
          %SETUP_OPT%

    - name: Build
      shell: cmd
      run: |
        cmake --build build --config ${{ inputs.build-config }}

    - name: Build MSI installer
      if: ${{ inputs.build-setup == true }}
      shell: cmd
      run: |
        cmake --build build --config ${{ inputs.build-config }} --target JPEGView.Setup
